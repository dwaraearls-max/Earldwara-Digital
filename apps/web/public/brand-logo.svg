<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-labelledby="title desc">
  <title id="title">Earlsdwara Digital</title>
  <desc id="desc">Blue wordmark: ED hex mark, Earlsdwara, divider line, Digital</desc>
